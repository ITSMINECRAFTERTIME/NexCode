<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign in — NexCode</title>
<link rel="stylesheet" href="../../css/base.css"/>
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:calc(var(--nav) + 32px) 20px 60px;position:relative;z-index:2}
.auth-card{width:100%;max-width:440px;background:rgba(255,255,255,.035);border:1px solid var(--b2);border-radius:var(--rxl);padding:clamp(28px,5vw,44px);box-shadow:0 40px 100px rgba(0,0,0,.6)}
.auth-logo{display:flex;align-items:center;gap:9px;font-size:20px;font-weight:800;letter-spacing:-.05em;margin-bottom:28px;justify-content:center;text-decoration:none;color:inherit}
.auth-logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#2f6bff,#1d4ed8);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(47,107,255,.4)}
.auth-logo-mark svg{width:18px;height:18px}
.auth-logo em{background:linear-gradient(120deg,var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal}
h1{font-size:1.55rem;font-weight:900;letter-spacing:-.035em;margin-bottom:6px;text-align:center}
.auth-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:28px}
.fg{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.fl{font-size:12.5px;font-weight:700;color:var(--t2);display:flex;align-items:center;justify-content:space-between}
.fl a{color:var(--a2);font-weight:600;font-size:12px;transition:color .14s}
.fl a:hover{color:var(--t1)}
.fi{width:100%;padding:13px 15px;background:rgba(0,0,0,.32);border:1px solid var(--b2);border-radius:var(--rm);color:var(--t1);font-size:14.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:rgba(47,107,255,.55);box-shadow:0 0 0 3px rgba(47,107,255,.1)}
.fi::placeholder{color:var(--t3)}
.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:44px}
.pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:4px;display:flex;align-items:center}
.pw-eye:hover{color:var(--t2)}
.submit-btn{width:100%;padding:14px;margin-top:4px;font-size:15px;font-weight:700}
.err-msg{font-size:13px;color:var(--red);background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.2);border-radius:10px;padding:11px 14px;display:none;margin-bottom:14px;line-height:1.5}
.auth-link{display:flex;justify-content:center;margin-top:22px;font-size:13.5px;color:var(--t3);gap:6px}
.auth-link a{color:var(--a2);font-weight:600;transition:color .14s}
.auth-link a:hover{color:var(--t1)}
</style>
</head>
<body>
<main class="auth-wrap">
  <div class="auth-card glass">
    <a href="../../index.html" class="auth-logo">
      <div class="auth-logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 6.5v6c0 5 3.8 8.5 9 9.5 5.2-1 9-4.5 9-9.5v-6L12 2z" fill="#fff" fill-opacity=".95"/><path d="M9 11.5l2 2 4-4.5" stroke="#2f6bff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      Nex<em>Code</em>
    </a>
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your NexCode dashboard.</p>

    <div class="err-msg" id="err-msg"></div>

    <div class="fg">
      <label class="fl" for="l-email">Email</label>
      <input class="fi" id="l-email" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="fg">
      <label class="fl" for="l-password">
        Password
        <a href="reset.html">Forgot password?</a>
      </label>
      <div class="pw-wrap">
        <input class="fi" id="l-password" type="password" placeholder="Your password" autocomplete="current-password"/>
        <button type="button" class="pw-eye" id="pw-eye" aria-label="Toggle password">👁</button>
      </div>
    </div>

    <button class="btn btn-primary submit-btn" id="login-btn">
      Sign in <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-left:4px"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="auth-link">
      <span>Don't have an account?</span>
      <a href="register.html">Create one free</a>
    </div>
  </div>
</main>

<script>
const API = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev';

document.getElementById('pw-eye').addEventListener('click', () => {
  const pw = document.getElementById('l-password');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  document.getElementById('pw-eye').textContent = pw.type === 'password' ? '👁' : '🙈';
});

document.getElementById('login-btn').addEventListener('click', async () => {
  const btn   = document.getElementById('login-btn');
  const errEl = document.getElementById('err-msg');
  errEl.style.display = 'none';

  const email    = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-password').value;

  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res  = await fetch(`${API}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      errEl.textContent = data.error || 'Could not sign in. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = 'Sign in <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-left:4px"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      return;
    }

    // Store tokens so the dashboard can use them
    localStorage.setItem('nxc_access',  data.accessToken);
    localStorage.setItem('nxc_refresh', data.refreshToken);
    localStorage.setItem('nxc_user',    JSON.stringify(data.user));

    // Redirect to dashboard
    window.location.href = '../../dashboard.html';

  } catch (err) {
    errEl.textContent = 'Could not connect to the server. Is the backend running?';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../../js/layout.js"></script>
</body>
</html>
