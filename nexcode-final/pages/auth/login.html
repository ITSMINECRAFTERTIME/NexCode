<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — NexCode</title>
<link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
<div class="aurora"></div>
<div class="auth-wrap">
  <a href="../../index.html" class="auth-logo">
    <div class="logo-mark">NX</div>
    <span class="logo-text">Nex<span>Code</span></span>
  </a>
  <div class="auth-card">
    <div class="auth-title">Welcome back</div>
    <div class="auth-subtitle">Sign in to your NexCode dashboard</div>
    <div id="alert-box"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div style="position:relative;"><input class="form-input" type="password" id="password" placeholder="••••••••" required autocomplete="current-password" style="padding-right:40px;"><button type="button" onclick="togglePwd()" id="eye-btn" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#6b7280;font-size:16px;padding:4px;line-height:1;">👁</button></div>
      </div>
      <div style="text-align:right;margin-bottom:16px">
        <a href="reset-confirm.html" style="color:var(--accent-bright);text-decoration:none;font-size:12.5px;font-weight:500">Forgot password?</a>
      </div>
      <button class="btn btn-primary" type="submit" id="submit-btn">Sign in</button>
    </form>
    <div class="auth-links">Don't have an account? <a href="register.html">Create one</a></div>
  </div>
</div>
<script>
const API = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev';

function togglePwd() {
  const input = document.getElementById('password');
  const btn = document.getElementById('eye-btn');
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}
const DASHBOARD = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev/dashboard';

const alertBox = document.getElementById('alert-box');
const btn = document.getElementById('submit-btn');

function showAlert(msg, type='error') {
  const icons = {
    error:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    success:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
  };
  alertBox.innerHTML = `<div class="alert alert-${type}">${icons[type]}<span>${msg}</span></div>`;
}

const p = new URLSearchParams(window.location.search);
if (p.get('confirmed')==='1') showAlert('Email verified — sign in below.','success');
if (p.get('reset')==='1') showAlert('Password updated — sign in with your new password.','success');

document.getElementById('login-form').addEventListener('submit', async e => {
  e.preventDefault();
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Signing in...';
  alertBox.innerHTML = '';
  try {
    const res = await fetch(`${API}/auth/login`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email: document.getElementById('email').value.trim(), password: document.getElementById('password').value })
    });
    const data = await res.json();
    if (!res.ok) { showAlert(data.error || 'Invalid email or password.'); btn.disabled=false; btn.textContent='Sign in'; return; }
    if (data.accessToken) localStorage.setItem('nxc_access_token', data.accessToken);
    if (data.refreshToken) localStorage.setItem('nxc_refresh_token', data.refreshToken);
    showAlert('Signed in — redirecting...','success');
    setTimeout(() => window.location.href = DASHBOARD + '?token=' + data.accessToken, 600);
  } catch {
    showAlert('Could not reach the backend. Is it running on port 3000?');
    btn.disabled=false; btn.textContent='Sign in';
  }
});
</script>
</body>
</html>
