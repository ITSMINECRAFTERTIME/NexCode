<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reset password — NexCode</title>
<link rel="stylesheet" href="../../css/base.css"/>
<style>
body{display:flex;flex-direction:column;min-height:100vh}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:calc(var(--nav)+32px) 20px 60px;position:relative;z-index:2}
.auth-card{width:100%;max-width:440px;background:rgba(255,255,255,.035);border:1px solid var(--b2);border-radius:var(--rxl);padding:clamp(28px,5vw,44px);box-shadow:0 40px 100px rgba(0,0,0,.6)}
.auth-logo{display:flex;align-items:center;gap:9px;font-size:20px;font-weight:800;letter-spacing:-.05em;margin-bottom:28px;justify-content:center;text-decoration:none;color:inherit}
.auth-logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#2f6bff,#1d4ed8);display:flex;align-items:center;justify-content:center}
.auth-logo-mark svg{width:18px;height:18px}
.auth-logo em{background:linear-gradient(120deg,var(--a2),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-style:normal}
h1{font-size:1.5rem;font-weight:900;letter-spacing:-.035em;margin-bottom:8px;text-align:center}
.auth-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:28px;line-height:1.6;max-width:320px;margin-left:auto;margin-right:auto}
.fg{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.fl{font-size:12.5px;font-weight:700;color:var(--t2)}
.fi{width:100%;padding:13px 15px;background:rgba(0,0,0,.32);border:1px solid var(--b2);border-radius:var(--rm);color:var(--t1);font-size:14.5px;outline:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:rgba(47,107,255,.55);box-shadow:0 0 0 3px rgba(47,107,255,.1)}
.fi::placeholder{color:var(--t3)}
.submit-btn{width:100%;padding:14px;font-size:15px;font-weight:700}
.err-msg{font-size:13px;color:var(--red);background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.2);border-radius:10px;padding:11px 14px;display:none;margin-bottom:14px}
.success-box{display:none;text-align:center;padding:8px 0}
.success-ic{font-size:40px;margin-bottom:14px}
.success-box h2{font-size:1.2rem;font-weight:900;margin-bottom:10px;background:linear-gradient(130deg,var(--green),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.success-box p{font-size:13.5px;color:var(--t2);line-height:1.7;max-width:300px;margin:0 auto 22px}
.back-link{display:flex;justify-content:center;margin-top:22px;font-size:13.5px}
.back-link a{color:var(--a2);font-weight:600;display:flex;align-items:center;gap:6px}
</style>
</head>
<body>
<main class="auth-wrap">
  <div class="auth-card glass">
    <a href="../../index.html" class="auth-logo">
      <div class="auth-logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 6.5v6c0 5 3.8 8.5 9 9.5 5.2-1 9-4.5 9-9.5v-6L12 2z" fill="#fff" fill-opacity=".95"/><path d="M9 11.5l2 2 4-4.5" stroke="#2f6bff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      Nex<em>Code</em>
    </a>
    <h1>Reset password</h1>
    <p class="auth-sub">Enter your email and we'll send you a link to set a new password.</p>

    <div class="err-msg" id="err-msg"></div>

    <div id="form-body">
      <div class="fg">
        <label class="fl" for="r-email">Email address</label>
        <input class="fi" id="r-email" type="email" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <button class="btn btn-primary submit-btn" id="reset-btn">Send reset link</button>
    </div>

    <div class="success-box" id="success-box">
      <div class="success-ic">📩</div>
      <h2>Check your inbox</h2>
      <p>If an account exists for that email, a reset link is on its way. It expires in 1 hour.</p>
      <a href="login.html" class="btn btn-ghost btn-sm" style="margin:0 auto">Back to login</a>
    </div>

    <div class="back-link" id="back-link">
      <a href="login.html">← Back to sign in</a>
    </div>
  </div>
</main>
<script>
const API = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev';
document.getElementById('reset-btn').addEventListener('click', async () => {
  const btn   = document.getElementById('reset-btn');
  const errEl = document.getElementById('err-msg');
  const email = document.getElementById('r-email').value.trim();
  errEl.style.display = 'none';
  if (!email) { errEl.textContent='Enter your email address.'; errEl.style.display='block'; return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    await fetch(`${API}/auth/reset-password`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email})
    });
    // Always show success (prevents email enumeration)
    document.getElementById('form-body').style.display = 'none';
    document.getElementById('back-link').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
  } catch {
    errEl.textContent = 'Could not connect. Is the backend running?';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Send reset link';
  }
});
document.addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('reset-btn').click(); });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../../js/layout.js"></script>
</body>
</html>
