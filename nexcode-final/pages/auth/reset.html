<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — NexCode</title>
<link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
<div class="aurora"></div>

<div class="auth-wrap">
  <a href="../../index.html" class="auth-logo">
    <div class="logo-mark">NX</div>
    <span class="logo-text">Nex<span>Code</span></span>
  </a>

  <!-- STATE 1: request a reset link -->
  <div class="auth-card" id="request-card">
    <div class="auth-title">Reset your password</div>
    <div class="auth-subtitle">We'll email you a link to set a new one</div>

    <div id="alert-box-request"></div>

    <form id="request-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button class="btn btn-primary" type="submit" id="request-btn">Send reset link</button>
    </form>

    <div class="auth-links">
      <a href="login.html">← Back to sign in</a>
    </div>
  </div>

  <!-- STATE 2: set new password (shown when a recovery token is in the URL) -->
  <div class="auth-card" id="newpw-card" style="display:none">
    <div class="auth-title">Set a new password</div>
    <div class="auth-subtitle">Choose something you haven't used before</div>

    <div id="alert-box-newpw"></div>

    <form id="newpw-form">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input class="form-input" type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        <div class="pw-strength">
          <div class="pw-bar" id="bar1"></div>
          <div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div>
          <div class="pw-bar" id="bar4"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input class="form-input" type="password" id="confirmPassword" placeholder="Repeat password" required minlength="8" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" type="submit" id="newpw-btn">Update password</button>
    </form>
  </div>

  <!-- STATE 3: link expired/invalid -->
  <div class="auth-card" id="expired-card" style="display:none">
    <div class="status-icon-wrap"><div class="status-icon error">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div></div>
    <div class="auth-title">Link expired</div>
    <div class="auth-subtitle">This reset link is no longer valid. Request a new one below.</div>
    <button class="btn btn-primary" onclick="showRequestCard()">Request new link</button>
  </div>
</div>

<script>
const API = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev';
const SUPABASE_URL = 'https://guejuktegklifjrdvfnp.supabase.co';
// This is the public anon key — safe to expose client-side, do NOT put the service role key here
const SUPABASE_ANON_KEY = 'PASTE_YOUR_SUPABASE_ANON_KEY_HERE';

function showAlert(boxId, msg, type = 'error') {
  const icons = {
    error: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    success: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
  };
  document.getElementById(boxId).innerHTML = `<div class="alert alert-${type}">${icons[type]}<span>${msg}</span></div>`;
}

function showRequestCard() {
  document.getElementById('request-card').style.display = '';
  document.getElementById('newpw-card').style.display = 'none';
  document.getElementById('expired-card').style.display = 'none';
}

// ── Detect which state to show based on the URL ──
// Supabase sends recovery links with tokens in the URL FRAGMENT (after #), e.g.:
//   #access_token=xxx&refresh_token=xxx&type=recovery
// or an error fragment if the link expired:
//   #error=access_denied&error_code=otp_expired&error_description=...
(function detectState() {
  const hash = window.location.hash.substring(1);
  const hashParams = new URLSearchParams(hash);

  if (hashParams.get('error')) {
    // Expired or invalid link
    document.getElementById('request-card').style.display = 'none';
    document.getElementById('newpw-card').style.display = 'none';
    document.getElementById('expired-card').style.display = '';
    return;
  }

  if (hashParams.get('type') === 'recovery' && hashParams.get('access_token')) {
    // Valid recovery token — show the new password form
    window.__recoveryAccessToken = hashParams.get('access_token');
    document.getElementById('request-card').style.display = 'none';
    document.getElementById('newpw-card').style.display = '';
    document.getElementById('expired-card').style.display = 'none';
    return;
  }

  // Default: show the request form
  showRequestCard();
})();

// ── STATE 1: Request reset link ──
document.getElementById('request-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const btn = document.getElementById('request-btn');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending...';

  try {
    const res = await fetch(`${API}/auth/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    // Always show success even if email doesn't exist (prevents account enumeration)
    showAlert('alert-box-request', 'If that email is registered, a reset link is on its way. Check your inbox.', 'success');
    btn.textContent = 'Link sent ✓';
    setTimeout(() => { btn.disabled = false; btn.textContent = 'Send reset link'; }, 5000);

  } catch (err) {
    showAlert('alert-box-request', 'Could not connect to backend. Is it running?', 'error');
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  }
});

// ── STATE 2: Set new password ──
const pwInput = document.getElementById('newPassword');
pwInput.addEventListener('input', () => {
  const val = pwInput.value;
  let score = 0;
  if (val.length >= 8) score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
  if (/[0-9]/.test(val) && /[^A-Za-z0-9]/.test(val)) score++;
  const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
  const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
  bars.forEach((bar, i) => { bar.style.background = i < score ? colors[Math.max(score - 1, 0)] : 'var(--border-subtle)'; });
});

document.getElementById('newpw-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('newpw-btn');

  if (newPassword !== confirmPassword) {
    showAlert('alert-box-newpw', 'Passwords do not match.', 'error');
    return;
  }
  if (newPassword.length < 8) {
    showAlert('alert-box-newpw', 'Password must be at least 8 characters.', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Updating...';

  try {
    // Call Supabase directly using the recovery access token from the URL fragment
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': `Bearer ${window.__recoveryAccessToken}`
      },
      body: JSON.stringify({ password: newPassword })
    });

    const data = await res.json();

    if (!res.ok) {
      showAlert('alert-box-newpw', data.msg || data.error_description || 'Could not update password.', 'error');
      btn.disabled = false;
      btn.textContent = 'Update password';
      return;
    }

    showAlert('alert-box-newpw', 'Password updated — redirecting to sign in...', 'success');
    setTimeout(() => { window.location.href = 'login.html?reset=1'; }, 1200);

  } catch (err) {
    showAlert('alert-box-newpw', 'Something went wrong. Try requesting a new link.', 'error');
    btn.disabled = false;
    btn.textContent = 'Update password';
  }
});
</script>
</body>
</html>
