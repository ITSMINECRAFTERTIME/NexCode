<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset password — NexCode</title>
<link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
<div class="aurora"></div>
<div class="auth-wrap">
  <a href="../../index.html" class="auth-logo">
    <div class="logo-mark">NX</div>
    <span class="logo-text">Nex<span>Code</span></span>
  </a>

  <!-- STATE 1: request link -->
  <div class="auth-card" id="request-card">
    <div class="auth-title">Reset your password</div>
    <div class="auth-subtitle">We'll email you a link to set a new one</div>
    <div id="alert-request"></div>
    <form id="request-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <button class="btn btn-primary" type="submit" id="request-btn">Send reset link</button>
    </form>
    <div class="auth-links"><a href="login.html">← Back to sign in</a></div>
  </div>

  <!-- STATE 2: set new password -->
  <div class="auth-card" id="newpw-card" style="display:none">
    <div class="auth-title">Set a new password</div>
    <div class="auth-subtitle">Choose something you haven't used before</div>
    <div id="alert-newpw"></div>
    <form id="newpw-form">
      <div class="form-group">
        <label class="form-label">New password</label>
        <input class="form-input" type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
        <div class="pw-strength">
          <div class="pw-bar" id="bar1"></div><div class="pw-bar" id="bar2"></div>
          <div class="pw-bar" id="bar3"></div><div class="pw-bar" id="bar4"></div>
        </div>
        <div class="form-hint">Must include an uppercase letter and a number.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm new password</label>
        <input class="form-input" type="password" id="confirmPassword" placeholder="Repeat password" required autocomplete="new-password">
      </div>
      <button class="btn btn-primary" type="submit" id="newpw-btn">Update password</button>
    </form>
  </div>

  <!-- STATE 3: expired -->
  <div class="auth-card" id="expired-card" style="display:none">
    <div class="status-icon-wrap"><div class="status-icon error">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div></div>
    <div class="auth-title">Link expired</div>
    <div class="auth-subtitle">Reset links expire after a short time. Request a new one below.</div>
    <button class="btn btn-primary" onclick="show('request-card')">Request new link</button>
  </div>
</div>

<script>
const API = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev';

let recoveryToken = null;
let recoveryRefresh = null;

function show(id) {
  ['request-card','newpw-card','expired-card'].forEach(c => {
    document.getElementById(c).style.display = c === id ? '' : 'none';
  });
}

function alert(boxId, msg, type='error') {
  const icons = {
    error:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    success:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'
  };
  document.getElementById(boxId).innerHTML = `<div class="alert alert-${type}">${icons[type]}<span>${msg}</span></div>`;
}

// Detect state from URL hash Supabase adds on redirect
(function() {
  const p = new URLSearchParams(window.location.hash.substring(1));
  if (p.get('error')) { show('expired-card'); return; }
  if (p.get('type') === 'recovery' && p.get('access_token')) {
    recoveryToken = p.get('access_token');
    recoveryRefresh = p.get('refresh_token') || '';
    show('newpw-card');
    return;
  }
  show('request-card');
})();

// STATE 1: send reset email via backend
document.getElementById('request-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('request-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending...';
  try {
    await fetch(`${API}/auth/reset-password`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email: document.getElementById('email').value.trim() })
    });
    // Always show success — backend never reveals if email exists
    alert('alert-request', 'If that email is registered, a reset link is on its way.', 'success');
    btn.textContent = 'Link sent ✓';
    setTimeout(() => { btn.disabled=false; btn.textContent='Send reset link'; }, 5000);
  } catch {
    alert('alert-request', 'Could not reach the backend. Is it running on port 3000?');
    btn.disabled=false; btn.textContent='Send reset link';
  }
});

// Password strength meter
document.getElementById('newPassword').addEventListener('input', function() {
  const v = this.value;
  let s = 0;
  if (v.length >= 8) s++;
  if (v.length >= 12) s++;
  if (/[A-Z]/.test(v) && /[a-z]/.test(v)) s++;
  if (/[0-9]/.test(v) && /[^A-Za-z0-9]/.test(v)) s++;
  const colors = ['#ef4444','#f59e0b','#3b82f6','#10b981'];
  ['bar1','bar2','bar3','bar4'].forEach((id,i) => {
    document.getElementById(id).style.background = i < s ? colors[Math.max(s-1,0)] : 'var(--border-subtle)';
  });
});

// STATE 2: set new password via backend route (your /auth/reset-password/confirm)
document.getElementById('newpw-form').addEventListener('submit', async e => {
  e.preventDefault();
  const pw = document.getElementById('newPassword').value;
  const cpw = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('newpw-btn');

  if (pw !== cpw) { alert('alert-newpw', 'Passwords do not match.'); return; }
  if (pw.length < 8) { alert('alert-newpw', 'Password must be at least 8 characters.'); return; }
  if (!/[A-Z]/.test(pw) || !/[0-9]/.test(pw)) { alert('alert-newpw', 'Must include an uppercase letter and a number.'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Updating...';

  try {
    const res = await fetch(`${API}/auth/reset-password/confirm`, {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization': `Bearer ${recoveryToken}`
      },
      body:JSON.stringify({ password: pw, refreshToken: recoveryRefresh })
    });
    const data = await res.json();
    if (!res.ok) { alert('alert-newpw', data.error || 'Could not update password.'); btn.disabled=false; btn.textContent='Update password'; return; }
    alert('alert-newpw', 'Password updated — redirecting to sign in...', 'success');
    setTimeout(() => window.location.href = 'login.html?reset=1', 1200);
  } catch {
    alert('alert-newpw', 'Could not reach the backend. Is it running on port 3000?');
    btn.disabled=false; btn.textContent='Update password';
  }
});
</script>
</body>
</html>
