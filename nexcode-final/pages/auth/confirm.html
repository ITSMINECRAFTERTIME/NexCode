<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirming email — NexCode</title>
<link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
<div class="aurora"></div>

<div class="auth-wrap">
  <a href="../../index.html" class="auth-logo">
    <div class="logo-mark">NX</div>
    <span class="logo-text">Nex<span>Code</span></span>
  </a>

  <!-- Loading state -->
  <div class="auth-card" id="loading-card">
    <div class="status-icon-wrap"><div class="status-icon loading">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    </div></div>
    <div class="auth-title">Confirming your email</div>
    <div class="auth-subtitle" style="margin-bottom:0">One moment...</div>
    <div class="dot-pulse" style="margin-top:16px"><span></span><span></span><span></span></div>
  </div>

  <!-- Success state -->
  <div class="auth-card" id="success-card" style="display:none">
    <div class="status-icon-wrap"><div class="status-icon success">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    </div></div>
    <div class="auth-title">Email confirmed</div>
    <div class="auth-subtitle">Your account is ready. Sign in to continue.</div>
    <button class="btn btn-primary" onclick="window.location.href='login.html?confirmed=1'">Continue to sign in</button>
  </div>

  <!-- Expired / error state -->
  <div class="auth-card" id="error-card" style="display:none">
    <div class="status-icon-wrap"><div class="status-icon error">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div></div>
    <div class="auth-title" id="error-title">Link expired</div>
    <div class="auth-subtitle" id="error-desc">This confirmation link is no longer valid. Create an account again or contact support if this keeps happening.</div>
    <button class="btn btn-primary" onclick="window.location.href='register.html'">Back to sign up</button>
  </div>
</div>

<script>
// Supabase sends the confirmation result in the URL FRAGMENT (after #):
//   Success: #access_token=xxx&refresh_token=xxx&type=signup
//   Failure: #error=access_denied&error_code=otp_expired&error_description=...
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);

function show(id) {
  ['loading-card','success-card','error-card'].forEach(c => {
    document.getElementById(c).style.display = c === id ? '' : 'none';
  });
}

setTimeout(() => {
  const error = params.get('error');
  const errorCode = params.get('error_code');
  const accessToken = params.get('access_token');
  const type = params.get('type');

  if (error) {
    // Handle the specific otp_expired case cleanly
    if (errorCode === 'otp_expired') {
      document.getElementById('error-title').textContent = 'Confirmation link expired';
      document.getElementById('error-desc').textContent = 'Confirmation links expire after a set time. Sign up again to get a fresh one, or try signing in if you already confirmed a different link.';
    } else {
      document.getElementById('error-title').textContent = 'Something went wrong';
      document.getElementById('error-desc').textContent = decodeURIComponent((params.get('error_description') || '').replace(/\+/g, ' ')) || 'This link is invalid. Please try again.';
    }
    show('error-card');
    return;
  }

  if (accessToken && (type === 'signup' || type === 'email_change' || type === 'magiclink')) {
    // Store the session so they're logged in immediately
    localStorage.setItem('nxc_access_token', accessToken);
    const refreshToken = params.get('refresh_token');
    if (refreshToken) localStorage.setItem('nxc_refresh_token', refreshToken);
    show('success-card');
    return;
  }

  // No recognizable fragment at all — treat as expired/invalid
  document.getElementById('error-title').textContent = 'Invalid confirmation link';
  document.getElementById('error-desc').textContent = 'This link is missing required information. Please use the link from your most recent confirmation email.';
  show('error-card');
}, 900); // brief delay so the loading state doesn't flash instantly
</script>
</body>
</html>
