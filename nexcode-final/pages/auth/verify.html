<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — NexCode</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05050a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #0d0d1a;
    border: 1px solid #1a1a2e;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 32px; }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 12px; }
  p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #2f6bff, #1a4fd6);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    width: 100%;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #1a1a2e;
    border-top-color: #2f6bff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #10b981; }
  .error { color: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ NexCode</div>
  <div id="content">
    <div class="spinner"></div>
    <h1>Verifying your email...</h1>
    <p>Please wait a moment.</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://guejuktegklifjrdvfnp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZWp1a3RlZ2tsaWZqcmR2Zm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTY1MzYsImV4cCI6MjA5ODg5MjUzNn0.QWWWro6oOaaJhKbewKIiplizMTvCcIkPlTJBcOys0q8';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function verify() {
  const content = document.getElementById('content');

  // Get params from both query string and hash
  const hashParams = new URLSearchParams(window.location.hash.substring(1));
  const searchParams = new URLSearchParams(window.location.search.substring(1));

  const tokenHash = searchParams.get('token_hash') || hashParams.get('token_hash');
  const type = searchParams.get('type') || hashParams.get('type') || 'signup';
  const accessToken = hashParams.get('access_token');
  const refreshToken = hashParams.get('refresh_token');
  const errorCode = hashParams.get('error_code') || searchParams.get('error_code');

  // Handle error in URL
  if (errorCode) {
    content.innerHTML = `
      <div class="icon">❌</div>
      <h1 class="error">Link expired</h1>
      <p>This verification link has expired or already been used. Please register again to get a new link.</p>
      <a href="register.html" class="btn">Back to Register</a>
    `;
    return;
  }

  // Method 1: token_hash (new email template format)
  if (tokenHash) {
    try {
      const { data, error } = await supabase.auth.verifyOtp({
        token_hash: tokenHash,
        type: type
      });

      if (error) throw error;

      // Store session
      if (data.session) {
        localStorage.setItem('nxc_access_token', data.session.access_token);
        localStorage.setItem('nxc_refresh_token', data.session.refresh_token);
      }

      content.innerHTML = `
        <div class="icon">✅</div>
        <h1 class="success">Email verified!</h1>
        <p>Your NexCode account is now active. Redirecting to your dashboard...</p>
      `;
      setTimeout(() => {
        window.location.href = '../../../nexcode-dashboard/index.html';
      }, 2000);
      return;
    } catch (err) {
      content.innerHTML = `
        <div class="icon">❌</div>
        <h1 class="error">Verification failed</h1>
        <p>${err.message || 'Invalid or expired link. Please register again.'}</p>
        <a href="register.html" class="btn" style="margin-top:8px;">Back to Register</a>
      `;
      return;
    }
  }

  // Method 2: access_token in hash (old format)
  if (accessToken && refreshToken) {
    try {
      const { data, error } = await supabase.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken
      });

      if (error) throw error;

      localStorage.setItem('nxc_access_token', accessToken);
      localStorage.setItem('nxc_refresh_token', refreshToken);

      content.innerHTML = `
        <div class="icon">✅</div>
        <h1 class="success">Email verified!</h1>
        <p>Your NexCode account is now active. Redirecting to your dashboard...</p>
      `;
      setTimeout(() => {
        window.location.href = '../../../nexcode-dashboard/index.html';
      }, 2000);
      return;
    } catch (err) {
      content.innerHTML = `
        <div class="icon">❌</div>
        <h1 class="error">Session error</h1>
        <p>${err.message}</p>
        <a href="login.html" class="btn" style="margin-top:8px;">Go to Login</a>
      `;
      return;
    }
  }

  // No token found at all
  content.innerHTML = `
    <div class="icon">⚠️</div>
    <h1>No verification token</h1>
    <p>This page should only be accessed via the link in your confirmation email.</p>
    <a href="register.html" class="btn">Back to Register</a>
  `;
}

verify();
</script>
</body>
</html>
