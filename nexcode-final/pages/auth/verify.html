<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — NexCode</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05050a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #0d0d1a;
  border: 1px solid #1a1a2e;
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 32px; }
.icon { font-size: 48px; margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 12px; }
p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
.btn {
  display: block;
  background: linear-gradient(135deg, #2f6bff, #1a4fd6);
  color: #fff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 32px;
  border-radius: 8px;
  margin-top: 16px;
  width: 100%;
  text-align: center;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #1a1a2e;
  border-top-color: #2f6bff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.success { color: #10b981; }
.err { color: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ NexCode</div>
  <div id="app">
    <div class="spinner"></div>
    <h1>Verifying...</h1>
  </div>
</div>
<script>
const app = document.getElementById('app');
const q = new URLSearchParams(window.location.search);

const success = q.get('success');
const error = q.get('error');
const accessToken = q.get('access_token');
const refreshToken = q.get('refresh_token');

if (success === '1' && accessToken) {
  // Store tokens
  localStorage.setItem('nxc_access_token', accessToken);
  if (refreshToken) localStorage.setItem('nxc_refresh_token', refreshToken);

  app.innerHTML = `
    <div class="icon">✅</div>
    <h1 class="success">Email Verified!</h1>
    <p>Your NexCode account is active. Taking you to the dashboard...</p>
  `;
  setTimeout(() => {
    window.location.href = '../../../nexcode-dashboard/index.html';
  }, 2000);

} else if (error) {
  app.innerHTML = `
    <div class="icon">❌</div>
    <h1 class="err">Verification Failed</h1>
    <p>${decodeURIComponent(error)}</p>
    <a href="register.html" class="btn">Back to Register</a>
  `;

} else {
  app.innerHTML = `
    <div class="icon">⚠️</div>
    <h1>Invalid Link</h1>
    <p>This page should only be opened from your confirmation email.</p>
    <a href="register.html" class="btn">Back to Register</a>
  `;
}
</script>
</body>
</html>
