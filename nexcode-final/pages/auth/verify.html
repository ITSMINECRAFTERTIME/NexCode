<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — NexCode</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #05050a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #0d0d1a;
    border: 1px solid #1a1a2e;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
  }
  .logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 32px; }
  .icon { font-size: 48px; margin-bottom: 20px; }
  h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 12px; }
  p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
  .debug { font-size: 11px; color: #4b5563; word-break: break-all; margin-top: 16px; text-align: left; background: #0a0a14; padding: 12px; border-radius: 6px; }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #2f6bff, #1a4fd6);
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    width: 100%;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid #1a1a2e;
    border-top-color: #2f6bff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .success { color: #10b981; }
  .error-text { color: #ef4444; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ NexCode</div>
  <div id="content">
    <div class="spinner"></div>
    <h1>Verifying your email...</h1>
    <p>Please wait.</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://guejuktegklifjrdvfnp.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZWp1a3RlZ2tsaWZqcmR2Zm5wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMTY1MzYsImV4cCI6MjA5ODg5MjUzNn0.QWWWro6oOaaJhKbewKIiplizMTvCcIkPlTJBcOys0q8';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const content = document.getElementById('content');

function showError(title, msg, debugInfo) {
  content.innerHTML = `
    <div class="icon">❌</div>
    <h1 class="error-text">${title}</h1>
    <p>${msg}</p>
    ${debugInfo ? `<div class="debug">${debugInfo}</div>` : ''}
    <a href="register.html" class="btn" style="margin-top:16px">Back to Register</a>
  `;
}

function showSuccess() {
  content.innerHTML = `
    <div class="icon">✅</div>
    <h1 class="success">Email verified!</h1>
    <p>Your NexCode account is active. Redirecting to dashboard...</p>
  `;
  setTimeout(() => {
    window.location.href = '../../../nexcode-dashboard/index.html';
  }, 2000);
}

// Timeout after 10 seconds
const timer = setTimeout(() => {
  showError('Timed out', 'Verification took too long. Supabase may be slow. Try again.', 'URL: ' + window.location.href);
}, 10000);

async function verify() {
  try {
    const hash = new URLSearchParams(window.location.hash.substring(1));
    const query = new URLSearchParams(window.location.search);

    const errorCode = hash.get('error_code') || query.get('error_code');
    const errorDesc = hash.get('error_description') || query.get('error_description');

    if (errorCode) {
      clearTimeout(timer);
      showError('Link expired', decodeURIComponent(errorDesc || 'This link has expired. Please register again.'), 'error_code: ' + errorCode);
      return;
    }

    const tokenHash = query.get('token_hash');
    const type = query.get('type') || 'signup';
    const accessToken = hash.get('access_token');
    const refreshToken = hash.get('refresh_token');

    // Show what we found for debugging
    document.querySelector('p').textContent = tokenHash ? 'Found token_hash...' : accessToken ? 'Found access_token...' : 'No token found in URL';

    if (tokenHash) {
      const { data, error } = await supabase.auth.verifyOtp({ token_hash: tokenHash, type });
      clearTimeout(timer);
      if (error) {
        showError('Verification failed', error.message, 'token_hash method | code: ' + (error.code || 'none'));
        return;
      }
      if (data?.session) {
        localStorage.setItem('nxc_access_token', data.session.access_token);
        localStorage.setItem('nxc_refresh_token', data.session.refresh_token);
      }
      showSuccess();
      return;
    }

    if (accessToken && refreshToken) {
      const { data, error } = await supabase.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      clearTimeout(timer);
      if (error) {
        showError('Session error', error.message, 'setSession method');
        return;
      }
      localStorage.setItem('nxc_access_token', accessToken);
      localStorage.setItem('nxc_refresh_token', refreshToken);
      showSuccess();
      return;
    }

    clearTimeout(timer);
    showError('No token found', 'This page should only be accessed via the confirmation email link.', 'hash: ' + window.location.hash + ' | search: ' + window.location.search);

  } catch (err) {
    clearTimeout(timer);
    showError('Unexpected error', err.message, err.stack);
  }
}

verify();
</script>
</body>
</html>
