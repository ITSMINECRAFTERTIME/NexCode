<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Email — NexCode</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #05050a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #0d0d1a;
  border: 1px solid #1a1a2e;
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
}
.logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 32px; }
.icon { font-size: 48px; margin-bottom: 20px; }
h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 12px; }
p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 24px; }
.btn {
  display: block;
  background: linear-gradient(135deg, #2f6bff, #1a4fd6);
  color: #fff;
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  padding: 14px 32px;
  border-radius: 8px;
  margin-top: 16px;
  width: 100%;
  text-align: center;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #1a1a2e;
  border-top-color: #2f6bff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.success { color: #10b981; }
.err { color: #ef4444; }
.debug { font-size: 11px; color: #6b7280; word-break: break-all; margin-top: 16px; background: #0a0a14; padding: 10px; border-radius: 6px; text-align: left; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">⚡ NexCode</div>
  <div id="app">
    <div class="spinner"></div>
    <h1>Verifying...</h1>
    <p id="status">Sending to backend...</p>
  </div>
</div>
<script>
const BACKEND = 'https://scaling-space-waddle-qrv79j4pp92x9w4-3000.app.github.dev';

const app = document.getElementById('app');
const status = document.getElementById('status');

function show(icon, title, msg, link, linkText, debug) {
  app.innerHTML = `
    <div class="icon">${icon}</div>
    <h1>${title}</h1>
    <p>${msg}</p>
    ${debug ? `<div class="debug">${debug}</div>` : ''}
    ${link ? `<a href="${link}" class="btn">${linkText}</a>` : ''}
  `;
}

async function run() {
  // Read URL params - check both hash and query
  const hash = new URLSearchParams(window.location.hash.replace('#',''));
  const query = new URLSearchParams(window.location.search);

  const errorCode = hash.get('error_code') || query.get('error_code');
  if (errorCode) {
    show('❌', 'Link Expired', 'This verification link has expired. Please register again with a new email.', 'register.html', 'Back to Register', 'error: ' + errorCode);
    return;
  }

  const tokenHash = query.get('token_hash');
  const type = query.get('type') || 'signup';
  const accessToken = hash.get('access_token');
  const refreshToken = hash.get('refresh_token');

  // Send to backend to verify
  let endpoint, body;

  if (tokenHash) {
    endpoint = '/auth/verify-token';
    body = { token_hash: tokenHash, type };
  } else if (accessToken) {
    endpoint = '/auth/verify-session';
    body = { access_token: accessToken, refresh_token: refreshToken };
  } else {
    show('⚠️', 'No Token', 'Open this page from the link in your confirmation email.', 'register.html', 'Register', 'search: ' + window.location.search + ' hash: ' + window.location.hash);
    return;
  }

  try {
    status.textContent = 'Contacting server...';
    const res = await fetch(BACKEND + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok || data.error) {
      show('❌', 'Verification Failed', data.error || 'Something went wrong.', 'register.html', 'Try Again', 'status: ' + res.status);
      return;
    }

    // Store tokens
    if (data.access_token) {
      localStorage.setItem('nxc_access_token', data.access_token);
      localStorage.setItem('nxc_refresh_token', data.refresh_token);
    }

    show('✅', '<span class="success">Email Verified!</span>', 'Your NexCode account is active. Redirecting to dashboard...', null, null, null);
    setTimeout(() => {
      window.location.href = '../../../nexcode-dashboard/index.html';
    }, 2000);

  } catch (err) {
    show('❌', 'Connection Error', 'Could not reach the NexCode backend. Make sure the server is running.', 'register.html', 'Back to Register', err.message);
  }
}

run();
</script>
</body>
</html>
